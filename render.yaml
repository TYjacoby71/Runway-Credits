services:
  - type: web
    name: perk-engine-api
    runtime: python
    plan: free
    rootDir: perk-engine
    buildCommand: pip install -r requirements.txt && python setup_db.py
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /tmp/perk_engine.db
      - key: PERK_ENGINE_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://cashflow.run,https://www.cashflow.run
